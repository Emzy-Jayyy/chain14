<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animation Playground</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HERO -->
    <section class="hero">
        <h1 class="hero-title">
            Hi, I'm Emzy 👋
        </h1>

        <p>
            Front-End Developer & Creative Builder
        </p>

        <button class="cta-button">
            Hire Me
        </button>
    </section>

    <!-- TRANSITION DEMO -->
    <section class="demo-section">
        <h2>Transition Demo</h2>

        <div class="button-group">

            <button class="snap-btn">
                Instant Hover
            </button>

            <button class="smooth-btn">
                Smooth Hover
            </button>

        </div>
    </section>

    <!-- TRANSFORM DEMO -->
    <section class="demo-section">

        <h2>Transform Demo</h2>

        <div class="transform-grid">

            <div class="box translate-box">
                Translate
            </div>

            <div class="box scale-box">
                Scale
            </div>

            <div class="box rotate-box">
                Rotate
            </div>

        </div>

    </section>

    <!-- TIMING FUNCTIONS -->
    <section class="demo-section">

        <h2>Timing Functions</h2>

        <div class="timing-demo">

            <div class="ball linear">
                linear
            </div>

            <div class="ball ease">
                ease
            </div>

            <div class="ball ease-in">
                ease-in
            </div>

            <div class="ball ease-out">
                ease-out
            </div>

        </div>

    </section>

</body>
</html>
