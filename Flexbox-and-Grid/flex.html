<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox layout</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .container {
        width: 1200px;
        height: 100vh;
        background-color: bisque;
        display: flex;
        flex-direction: row;
        gap: 20px;
        justify-content: flex-start;
        align-items: flex-start;
        flex-wrap: wrap;
      }

      .item {
        flex-basis: 300px;
        /* width: 300px; */
        height: 200px;
        background-color: tomato;
        /* flex-grow: 1; */
      }

      /* .item1{
    flex-basis:250px;
    flex-shrink:0;
}

.item2{
    flex-basis:250px;
    flex-shrink:1;
}

.item3{
    flex-basis:250px;
    flex-shrink:2;
} */
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item item1">1</div>
      <div class="item item2">2</div>
      <div class="item item3">3</div>
      <div class="item">4</div>
      <div class="item">5</div>
    </div>

    <!-- <div class="item">6</div> -->
  </body>
</html>
